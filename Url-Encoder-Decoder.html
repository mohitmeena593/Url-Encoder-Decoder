<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CYBER TOOL // URL OBFUSCATOR</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
    /* --- CORE STYLES --- */
    body {
        margin: 0;
        padding: 0;
        background-color: #e0e5ec;
        color: #1a1a2e;
        font-family: 'Orbitron', sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-image: 
            radial-gradient(circle at 10% 20%, rgba(0, 162, 255, 0.1) 0%, transparent 20%),
            radial-gradient(circle at 90% 80%, rgba(255, 0, 85, 0.1) 0%, transparent 20%);
    }

    /* --- GLASSMORPHISM CONTAINER --- */
    .cyber-window {
        width: 90%;
        max-width: 900px;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(10px);
        border: 2px solid #00a2ff;
        border-radius: 15px;
        box-shadow: 
            0 0 0 4px rgba(0, 162, 255, 0.1),
            0 20px 50px rgba(0, 0, 0, 0.15),
            inset 0 0 0 1px rgba(255, 255, 255, 0.5);
        overflow: hidden;
        position: relative;
    }

    /* --- DECORATIVE CORNERS --- */
    .cyber-window::before, .cyber-window::after {
        content: '';
        position: absolute;
        width: 30px;
        height: 30px;
        border: 3px solid #00a2ff;
        transition: all 0.3s ease;
    }

    .cyber-window::before {
        top: -2px;
        left: -2px;
        border-right: none;
        border-bottom: none;
    }

    .cyber-window::after {
        bottom: -2px;
        right: -2px;
        border-left: none;
        border-top: none;
    }

    /* --- HEADER --- */
    .header {
        background: linear-gradient(90deg, #00a2ff, #00d4ff);
        padding: 15px 25px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 2px 15px rgba(0, 162, 255, 0.3);
    }

    .logo {
        font-family: 'Orbitron', sans-serif;
        font-weight: 700;
        font-size: 20px;
        color: #fff;
        text-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        letter-spacing: 2px;
    }

    .logo span {
        color: #1a1a2e;
    }

    .status-indicator {
        display: flex;
        align-items: center;
        gap: 8px;
        color: white;
        font-size: 12px;
        font-weight: 600;
    }

    .pulse-dot {
        width: 10px;
        height: 10px;
        background: #00ff00;
        border-radius: 50%;
        box-shadow: 0 0 10px #00ff00;
        animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
        0% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.3); opacity: 0.7; }
        100% { transform: scale(1); opacity: 1; }
    }

    /* --- MAIN CONTENT --- */
    .content {
        padding: 30px;
    }

    .label-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        font-weight: 600;
        color: #00a2ff;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    textarea {
        width: 100%;
        height: 250px;
        background: #f0f4f8;
        border: 2px solid #cbd5e1;
        border-radius: 8px;
        color: #1a1a2e;
        font-family: 'Fira Code', monospace;
        font-size: 16px;
        padding: 20px;
        box-sizing: border-box;
        resize: none;
        outline: none;
        transition: all 0.3s;
        box-shadow: inset 4px 4px 10px rgba(0,0,0,0.05);
    }

    textarea:focus {
        border-color: #00a2ff;
        box-shadow: 
            inset 4px 4px 10px rgba(0,0,0,0.05),
            0 0 15px rgba(0, 162, 255, 0.2);
    }

    /* --- BUTTONS --- */
    .btn-group {
        display: flex;
        gap: 20px;
        margin-top: 25px;
    }

    button {
        flex: 1;
        padding: 18px;
        font-family: 'Orbitron', sans-serif;
        font-size: 16px;
        font-weight: 700;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 2px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
    }

    .btn-encode {
        background: linear-gradient(135deg, #00a2ff, #0066cc);
        color: white;
        box-shadow: 0 5px 15px rgba(0, 102, 204, 0.4);
    }

    .btn-encode:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(0, 102, 204, 0.5);
    }

    .btn-decode {
        background: linear-gradient(135deg, #ff0055, #cc0044);
        color: white;
        box-shadow: 0 5px 15px rgba(204, 0, 68, 0.4);
    }

    .btn-decode:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(204, 0, 68, 0.5);
    }

    button:active {
        transform: translateY(0);
    }

    /* --- CONSOLE LOG AREA --- */
    .console-output {
        margin-top: 25px;
        background: #1a1a2e;
        color: #00ff00;
        padding: 15px;
        border-radius: 8px;
        font-size: 13px;
        height: 100px;
        overflow-y: auto;
        border-left: 4px solid #00ff00;
        font-family: 'Fira Code', monospace;
        box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
    }

    .log-line {
        margin: 5px 0;
        opacity: 0.9;
    }

    .log-line::before {
        content: '> ';
        color: #00a2ff;
    }

    /* --- FOOTER --- */
    .footer {
        text-align: center;
        padding: 15px;
        color: #64748b;
        font-size: 12px;
        border-top: 1px solid #e2e8f0;
        background: rgba(255,255,255,0.5);
    }

    .highlight {
        color: #00a2ff;
        font-weight: bold;
    }

    /* --- MATRIX RAIN DECORATION (Optional CSS) --- */
    .bg-code {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0.03;
        z-index: -1;
        pointer-events: none;
        font-family: 'Fira Code', monospace;
        font-size: 10px;
        color: #000;
        white-space: pre-wrap;
        overflow: hidden;

    }
</style>

</head>
<body>

<!-- Background Code Decoration -->
<div class="bg-code" id="bgCode"></div>

<div class="cyber-window">
    <div class="header">
        <div class="logo">CYBER<span>TOOL</span></div>
        <div class="status-indicator">
            <div class="pulse-dot"></div>
            SYSTEM ONLINE
        </div>
    </div>

    <div class="content">
        <div class="label-row">
            <span>Input Stream</span>
            <span id="charCount">0 CHARACTERS</span>
        </div>
        
        <textarea id="text" placeholder="Paste malicious payload or URL here..."></textarea>

        <div class="btn-group">
            <button class="btn-encode" onclick="process('encode')">ENCRYPT PAYLOAD</button>
            <button class="btn-decode" onclick="process('decode')">DECRYPT PAYLOAD</button>
        </div>

        <div class="console-output" id="console">
            <div class="log-line">System initialized...</div>
            <div class="log-line">Waiting for input...</div>
        </div>
    </div>

    <div class="footer">
    SECURE CONNECTION ESTABLISHED // CREATED BY 
    <a href="https://www.linkedin.com/in/mohit-meena-08a239332"
       target="_blank"
       class="highlight">
       MOHIT MEENA
    </a>
</div>
    
</div>

<script>
    // Background Matrix Effect (Light)
    const bgCode = document.getElementById('bgCode');
    const chars = '01X@#$%&<>[]{}';
    let codeStr = '';
    
    for(let i = 0; i < 200; i++) {
        let line = '';
        for(let j = 0; j < 50; j++) {
            line += chars[Math.floor(Math.random() * chars.length)] + ' ';
        }
        codeStr += line + '\n';
    }
    bgCode.innerText = codeStr;

    // Character Counter
    const textArea = document.getElementById('text');
    const charCount = document.getElementById('charCount');
    
    textArea.addEventListener('input', () => {
        charCount.innerText = textArea.value.length + ' CHARACTERS';
    });

    // Logging Function
    function log(msg, type = 'normal') {
        const consoleDiv = document.getElementById('console');
        const div = document.createElement('div');
        div.className = 'log-line';
        
        const time = new Date().toLocaleTimeString();
        div.innerText = `[${time}] ${msg}`;
        
        if(type === 'success') div.style.color = '#00ff00';
        if(type === 'error') div.style.color = '#ff0055';
        
        consoleDiv.appendChild(div);
        consoleDiv.scrollTop = consoleDiv.scrollHeight;
    }

    // Main Process Function
    function process(action) {
        const val = textArea.value;
        
        if(!val) {
            log('ERROR: Input buffer is empty!', 'error');
            return;
        }

        if(action === 'encode') {
            log(`Initiating ENCODING protocol...`);
            setTimeout(() => {
                textArea.value = encodeURIComponent(val);
                log(`SUCCESS: Data encoded successfully.`, 'success');
                log(`Output length: ${textArea.value.length} bytes.`);
            }, 400);
        } else {
            log(`Initiating DECODING protocol...`);
            setTimeout(() => {
                try {
                    textArea.value = decodeURIComponent(val);
                    log(`SUCCESS: Payload decoded.`, 'success');
                    log(`Output length: ${textArea.value.length} bytes.`);
                } catch(e) {
                    log(`ERROR: Invalid URI component!`, 'error');
                }
            }, 400);
        }
    }
</script>

</body>
</html>
